<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Демо рейтинга автоматизаций</title>
    <link rel="stylesheet" href="./styles.css?v=board-1">
  </head>
  <body>
    <main class="records-board">
      <header class="board-header">
        <div>
          <p class="board-kicker">AI workshops</p>
          <h1><span aria-hidden="true">⚡</span> Рейтинг автоматизаций</h1>
        </div>
        <aside class="cola-record" aria-label="Пасхалка">
          <span>Рекорд</span>
          <strong>Леха не пил колу</strong>
          <b id="colaRecordDays">1 день</b>
        </aside>
      </header>

      <section class="podium" id="podiumList" aria-label="Топ отделов"></section>

      <section class="department-grid" id="departmentBoard" aria-label="Автоматизации по отделам"></section>

      <section class="latest-strip" id="latestAutomation">
        <div class="latest-icon" aria-hidden="true">⚡</div>
        <div>
          <p>Последняя автоматизация</p>
          <h2>Пока ждем первую запись</h2>
          <span>Добавьте автоматизацию в Google Таблицу</span>
        </div>
        <a class="latest-action" id="sheetLink" href="#" target="_blank" rel="noreferrer">Внедри свою →</a>
      </section>
    </main>

    <script>
      window.AUTOMATION_DASHBOARD_DEMO = true;
    </script>
    <script src="./config.js?v=board-1"></script>
    <script src="./app.js?v=board-1"></script>
  </body>
</html>
